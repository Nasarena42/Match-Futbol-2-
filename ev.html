<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos — Match Fútbol</title>
  <!-- Fuentes CORREGIDAS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    :root {
      --primario: #27ae60;
      --oscuro: #2c3e50;
      --texto-suave: #7f8c8d;
      --error: #e74c3c;
      --font-titulo: 'Bebas Neue', sans-serif;
    }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background-color: #f8f9fa;
    }
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .grid-container { grid-template-columns: 1fr; }
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: var(--texto-suave);
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      box-sizing: border-box;
    }
    .btn-submit {
      width: 100%;
      background: var(--primario);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #219150; }
    .alert-banner {
      display: none;
      background: #f8d7da;
      color: var(--error);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      border-left: 4px solid var(--error);
    }
    .tab-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: #f8f9fa;
      cursor: pointer;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .tab-btn.active {
      background: var(--oscuro);
      color: white;
      border-color: var(--oscuro);
    }
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .status-active { background: #e3f2fd; color: #0d47a1; }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 220px;
      background: white;
      border-right: 1px solid #eee;
      padding: 24px 16px;
      box-sizing: border-box;
    }
    .main-content { margin-left: 240px; padding: 24px; }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-title {
      font-family: var(--font-titulo);
      font-size: 1.8rem;
      color: var(--oscuro);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--texto-suave);
    }
    .nav-item.active {
      background: var(--primario);
      color: white;
    }
    .section-box {
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⚽</span>
      <div><div class="logo-title">MATCH</div><div class="logo-sub">FÚTBOL</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Inicio</span></a>
      <a href="clientes.html"  class="nav-item"><span class="nav-icon">👥</span><span>Clientes</span></a>
      <a href="reservas.html"  class="nav-item"><span class="nav-icon">📅</span><span>Reservas</span></a>
      <a href="pagos.html"     class="nav-item"><span class="nav-icon">💰</span><span>Pagos</span></a>
      <a href="eventos.html"   class="nav-item active"><span class="nav-icon">🎉</span><span>Eventos</span></a>
    </nav>
    <div class="sidebar-footer">Instituto Cervantes</div>
  </aside>

  <main class="main-content">
    <header class="top-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <h1 class="page-title">Eventos / Quincho</h1>
      <div class="top-date" id="topDate" style="color: var(--texto-suave); font-weight: 500;"></div>
    </header>

    <div class="grid-container">
      <section class="section-box">
        <h2 style="font-family: var(--font-titulo); font-size: 1.4rem; margin-bottom: 16px; color: var(--oscuro); letter-spacing: 0.5px;">NUEVA RESERVA</h2>
        <div id="errorBanner" class="alert-banner"></div>

        <form id="formEvento">
          <div class="form-group">
            <label>Nombre del Cliente</label>
            <input type="text" id="cliente" class="form-control" placeholder="Ej. Juan Pérez" required>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
              <label>Tipo de Evento</label>
              <select id="tipoEvento" class="form-control">
                <option value="Cumpleaños">Cumpleaños</option>
                <option value="Tercer Tiempo">Tercer Tiempo</option>
                <option value="Empresarial">Empresarial</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Cantidad de Invitados</label>
              <input type="number" id="invitados" class="form-control" min="1" placeholder="Ej. 30" required>
            </div>
          </div>

          <div class="form-group">
            <label>Fecha del Evento</label>
            <input type="date" id="fecha" class="form-control" required>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
              <label>Hora Inicio</label>
              <input type="time" id="horaInicio" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Hora Fin</label>
              <input type="time" id="horaFin" class="form-control" required>
            </div>
          </div>

          <button type="submit" class="btn-submit" style="font-family: var(--font-titulo); font-size: 1.1rem; letter-spacing: 1px;">CONFIRMAR RESERVA</button>
        </form>
      </section>

      <section class="section-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px;">
          <h2 style="font-family: var(--font-titulo); font-size: 1.4rem; color: var(--oscuro); margin: 0; letter-spacing: 0.5px;">REPORTE DE OCUPACIÓN</h2>
          <div style="display: flex; gap: 8px;">
            <button type="button" class="tab-btn active" id="btnDia" onclick="filtrarReporte('dia')">Hoy</button>
            <button type="button" class="tab-btn" id="btnSemana" onclick="filtrarReporte('semana')">Esta Semana</button>
            <button type="button" class="tab-btn" id="btnTodos" onclick="filtrarReporte('todos')">Ver Todos</button>
          </div>
        </div>

        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem;">
            <thead>
              <tr style="border-bottom: 2px solid #edf2f7; color: var(--texto-suave); font-weight: 600;">
                <th style="padding: 12px 8px;">Cliente</th>
                <th style="padding: 12px 8px;">Fecha</th>
                <th style="padding: 12px 8px;">Horario</th>
                <th style="padding: 12px 8px;">Evento</th>
                <th style="padding: 12px 8px; text-align: center;">Invitados</th>
                <th style="padding: 12px 8px;">Estado</th>
              </tr>
            </thead>
            <tbody id="tablaEventosBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <!-- JavaScript COMPLETO Y CORRECTO -->
  <script>
    // Esperar a que cargue todo el HTML antes de ejecutar
    document.addEventListener('DOMContentLoaded', function() {
      let reservas = JSON.parse(localStorage.getItem('reservas_quincho')) || [
        { cliente: "Carlos Gómez", fecha: "2026-06-05", horaInicio: "21:00", horaFin: "23:59", tipo: "Cumpleaños", invitados: 35 },
        { cliente: "FC Alonsos", fecha: "2026-06-08", horaInicio: "19:30", horaFin: "22:30", tipo: "Tercer Tiempo", invitados: 20 }
      ];
      let filtroActual = 'todos';

      // Fecha en la barra superior
      const fechaActual = new Date().toLocaleDateString('es-ES', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      document.getElementById('topDate').textContent = fechaActual.charAt(0).toUpperCase() + fechaActual.slice(1);

      // Enviar formulario
      document.getElementById('formEvento').addEventListener('submit', function(e) {
        e.preventDefault();
        const errorBanner = document.getElementById('errorBanner');
        errorBanner.style.display = 'none';

        const cliente = document.getElementById('cliente').value.trim();
        const tipo = document.getElementById('tipoEvento').value;
        const invitados = parseInt(document.getElementById('invitados').value);
        const fecha = document.getElementById('fecha').value;
        const horaInicio = document.getElementById('horaInicio').value;
        const horaFin = document.getElementById('horaFin').value;

        if (!cliente || !fecha || !horaInicio || !horaFin || isNaN(invitados) || invitados < 1) {
          mostrarError("Completá todos los campos correctamente.");
          return;
        }

        if (horaInicio >= horaFin) {
          mostrarError("La hora de fin debe ser mayor a la de inicio.");
          return;
        }

        const tieneCruce = reservas.some(reserva => 
          reserva.fecha === fecha && horaInicio < reserva.horaFin && horaFin > reserva.horaInicio
        );

        if (tieneCruce) {
          mostrarError("Horario ocupado, elegí otro.");
          return;
        }

        reservas.push({ cliente, fecha, horaInicio, horaFin, tipo, invitados });
        localStorage.setItem('reservas_quincho', JSON.stringify(reservas));
        this.reset();
        renderizarTabla();
        alert("✅ Reserva guardada con éxito");
      });

      function mostrarError(mensaje) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = mensaje;
        banner.style.display = 'block';
      }

      function filtrarReporte(tipo) {
        filtroActual = tipo;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn${tipo.charAt(0).toUpperCase() + tipo.slice(1)}`).classList.add('active');
        renderizarTabla();
      }

      function renderizarTabla() {
        const cuerpo = document.getElementById('tablaEventosBody');
        const hoy = new Date().toISOString().split('T')[0];
        let datos = [...reservas];

        if (filtroActual === 'dia') datos = reservas.filter(r => r.fecha === hoy);
        if (filtroActual === 'semana') {
          const limite = new Date();
          limite.setDate(limite.getDate() + 7);
          const limiteStr = limite.toISOString().split('T')[0];
          datos = reservas.filter(r => r.fecha >= hoy && r.fecha <= limiteStr);
        }

        if (datos.length === 0) {
          cuerpo.innerHTML = `<tr><td colspan="6" style="padding: 16px; text-align: center; color: var(--texto-suave);">No hay reservas</td></tr>`;
          return;
        }

        cuerpo.innerHTML = datos.map(r => {
          const estado = r.fecha >= hoy 
            ? '<span class="status-badge status-active">Confirmado</span>' 
            : '<span class="status-badge" style="background:#f1f1f1; color:#666;">Finalizado</span>';
          return `
            <tr style="border-bottom:1px solid #eee;">
              <td style="padding:12px 8px;">${r.cliente}</td>
              <td style="padding:12px 8px;">${r.fecha.split('-').reverse().join('/')}</td>
              <td style="padding:12px 8px;">${r.horaInicio} - ${r.horaFin}</td>
              <td style="padding:12px 8px;">${r.tipo}</td>
              <td style="padding:12px 8px; text-align:center;">${r.invitados}</td>
              <td style="padding:12px 8px;">${estado}</td>
            </tr>`;
        }).join('');
      }

      renderizarTabla();
    });
  </script>
</body>
</html>
