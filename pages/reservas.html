<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservas - Match Futbol</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>

  <aside class="sidebar">

   <div class="sidebar-logo">
    <span class="logo-icon">⚽</span>
      <div><div class="logo-title">MATCH</div><div class="logo-sub">FÚTBOL</div></div>
      </div>

      <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Inicio</span></a>
      <a href="clientes.html"  class="nav-item"><span class="nav-icon">👥</span><span>Clientes</span></a>
      <a href="reservas.html"  class="nav-item active"><span class="nav-icon">📅</span><span>Reservas</span></a>
      <a href="pagos.html"     class="nav-item"><span class="nav-icon">💰</span><span>Pagos</span></a>
      <a href="eventos.html"   class="nav-item"><span class="nav-icon">🎉</span><span>Eventos</span></a>
    </nav>

  <div class="sidebar-footer">Instituto Cervantes</div>
  </aside>

  <main class="main-content">
     <header class="top-bar">
      <h1 class="page-title">Reservas</h1>
      <div class="top-date" id="topDate"></div>
    </header>
    <div class="mensaje-ok" id="mensajeOk"></div>

    
    <h2>NUEVA RESERVA</h2><br>
    <form id="formReserva">

      <label>Cliente *</label>
      <select id="clienteSelect">
        <option value="">-- Seleccioná un cliente --</option>
      </select>

      <label>Cancha *</label>
      <select id="cancha">
        <option value="1">Cancha 1</option>
        <option value="2">Cancha 2</option>
        <option value="3">Cancha 3</option>
        <option value="4">Cancha 4</option>
      </select>

      <label>Fecha *</label>
      <input type="date" id="fecha">

      <label>Hora *</label>
      <select id="hora" onchange="calcularPrecio()">
        <option value="08:00">08:00</option>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
        <option value="19:00">19:00</option>
        <option value="20:00">20:00</option>
        <option value="21:00">21:00</option>
        <option value="22:00">22:00</option>
        <option value="23:00">23:00</option>
      </select>

      <label>Turno</label>
      <input type="text" id="turno">

      <label>Precio por hora ($)</label>
      <input type="number" id="precio">

      <label>Información adicional<br>
        💡 Precios de referencia:<br>
        ☀️ Diurno (antes de 20:00): $30.000/hora<br>
        🌙 Nocturno (20:00 en adelante): $35.000/hora
     </label>

      <label>Seña pagada ($)</label>
      <input type="number" id="sena" placeholder="0" min="0">

      <label>Estado del pago</label>
      <select id="estadoPago">
        <option value="Seña pagada">Seña pagada</option>
        <option value="Pagada completa">Pagada completa</option>
        <option value="Sin pago">Sin pago</option>
      </select>

      <button type="button" onclick="guardarReserva()">Guardar reserva</button>

    </form>

    <h2>LISTA DE RESERVAS</h2>
    <div class="buscador">
      <input type="date" id="filtroFecha" onchange="filtrarReservas()">
      <select id="filtroHora" onchange="filtrarReservas()">
        <option value="">-- Todas las horas --</option>
        <option value="08:00">08:00</option>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
        <option value="19:00">19:00</option>
        <option value="20:00">20:00</option>
        <option value="21:00">21:00</option>
        <option value="22:00">22:00</option>
        <option value="23:00">23:00</option>
      </select>
      <button class='btn-filtro' type="button" onclick="limpiarFiltros()">Limpiar filtros</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Cancha</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Turno</th>
          <th>Precio</th>
          <th>Seña</th>
          <th>Pago</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaReservas">
        <tr><td colspan="11">No hay reservas registradas.</td></tr>
      </tbody>
    </table>

  </main>



  <script>

    function cargarClientes() {
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var select = document.getElementById("clienteSelect");
      select.innerHTML = "<option value=''>-- Seleccioná un cliente --</option>";
      for (var i = 0; i < clientes.length; i++) {
        var opcion = document.createElement("option");
        opcion.value = clientes[i].nombre;
        opcion.textContent = clientes[i].nombre + " - " + clientes[i].telefono;
        select.appendChild(opcion);
      }
    }

    function calcularPrecio() {
      var hora = document.getElementById("hora").value;
      var horaNum = parseInt(hora.split(":")[0]);
      if (horaNum >= 20) {
        document.getElementById("turno").value  = "🌙 Nocturno";
        document.getElementById("precio").value = 35000;
      } else {
        document.getElementById("turno").value  = "☀️ Diurno";
        document.getElementById("precio").value = 30000;
      }
    }

    function guardarReserva() {
      var cliente    = document.getElementById("clienteSelect").value;
      var cancha     = document.getElementById("cancha").value;
      var fecha      = document.getElementById("fecha").value;
      var hora       = document.getElementById("hora").value;
      var turno      = document.getElementById("turno").value;
      var precio     = document.getElementById("precio").value;
      var sena       = document.getElementById("sena").value;
      var estadoPago = document.getElementById("estadoPago").value;

      if (cliente == "" || fecha == "") {
        alert("El cliente y la fecha son obligatorios.");
        return;
      }

      if (precio == "") {
        alert("Por favor seleccioná una hora para calcular el precio.");
        return;
      }

      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];
      for (var i = 0; i < reservas.length; i++) {
        var r = reservas[i];
        if (r.cancha == cancha && r.fecha == fecha && r.hora == hora && r.estado != "cancelada") {
          alert("⚠️ Ya hay una reserva en la Cancha " + cancha + " el " + fecha + " a las " + hora + "hs.");
          return;
        }
      }

      var nuevaReserva = {
        cliente:    cliente,
        cancha:     cancha,
        fecha:      fecha,
        hora:       hora,
        turno:      turno,
        precio:     Number(precio),
        sena:       Number(sena || 0),
        estadoPago: estadoPago,
        estado:     "Activa"
      };

      reservas.push(nuevaReserva);
      localStorage.setItem("reservas", JSON.stringify(reservas));

      document.getElementById("clienteSelect").value = "";
      document.getElementById("fecha").value         = "";
      document.getElementById("sena").value          = "";
      document.getElementById("estadoPago").value    = "Seña pagada";
      document.getElementById("turno").value         = "";
      document.getElementById("precio").value        = "";

      var msg = document.getElementById("mensajeOk");
      msg.innerHTML = "✅ Reserva confirmada para <strong>" + cliente + "</strong> — Cancha " + cancha + " — " + formatearFecha(fecha) + " a las " + hora + "hs — " + turno + " — $" + Number(precio).toLocaleString("es-AR");
      msg.style.display = "block";
      setTimeout(function() { msg.style.display = "none"; }, 4000);

      mostrarReservas();
    }

    function filtrarReservas() {
      var fecha = document.getElementById("filtroFecha").value;
      var hora  = document.getElementById("filtroHora").value;
      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];

      var filtradas = reservas.filter(function(r, i) {
        r._indice = i;
        var coincideFecha = fecha == "" || r.fecha == fecha;
        var coincideHora  = hora  == "" || r.hora  == hora;
        return coincideFecha && coincideHora;
      });

      mostrarReservasFiltradas(filtradas);
    }

    function limpiarFiltros() {
      document.getElementById("filtroFecha").value = "";
      document.getElementById("filtroHora").value  = "";
      mostrarReservas();
    }

    function mostrarReservasFiltradas(reservas) {
      var tbody = document.getElementById("tablaReservas");

      if (reservas.length == 0) {
        tbody.innerHTML = "<tr><td colspan='11'>No se encontraron reservas.</td></tr>";
        return;
      }

      var html = "";
      for (var i = 0; i < reservas.length; i++) {
        var r = reservas[i];
        var estilo = r.estado == "cancelada" ? "style='color:gray;text-decoration:line-through'" : "";
        html += "<tr " + estilo + ">";
        html += "<td>" + (i + 1) + "</td>";
        html += "<td>" + r.cliente + "</td>";
        html += "<td>Cancha " + r.cancha + "</td>";
        html += "<td>" + formatearFecha(r.fecha) + "</td>";
        html += "<td>" + r.hora + "hs</td>";
        html += "<td>" + (r.turno || "—") + "</td>";
        html += "<td>$" + Number(r.precio || 0).toLocaleString("es-AR") + "</td>";
        html += "<td>$" + Number(r.sena || 0).toLocaleString("es-AR") + "</td>";
        html += "<td>" + r.estadoPago + "</td>";
        html += "<td>" + r.estado + "</td>";
        html += "<td>";
        if (r.estado != "cancelada") {
          html += "<button class='btn-eliminar' onclick='cancelarReserva(" + r._indice + ")'>Cancelar</button>";
        }
        html += "</td>";
        html += "</tr>";
      }
      tbody.innerHTML = html;
    }

    function mostrarReservas() {
      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];
      var tbody = document.getElementById("tablaReservas");

      if (reservas.length == 0) {
        tbody.innerHTML = "<tr><td colspan='11'>No hay reservas registradas.</td></tr>";
        return;
      }

      var html = "";
      for (var i = 0; i < reservas.length; i++) {
        var r = reservas[i];
        var estilo = r.estado == "cancelada" ? "style='color:gray;text-decoration:line-through'" : "";
        html += "<tr " + estilo + ">";
        html += "<td>" + (i + 1) + "</td>";
        html += "<td>" + r.cliente + "</td>";
        html += "<td>Cancha " + r.cancha + "</td>";
        html += "<td>" + formatearFecha(r.fecha) + "</td>";
        html += "<td>" + r.hora + "hs</td>";
        html += "<td>" + (r.turno || "—") + "</td>";
        html += "<td>$" + Number(r.precio || 0).toLocaleString("es-AR") + "</td>";
        html += "<td>$" + Number(r.sena || 0).toLocaleString("es-AR") + "</td>";
        html += "<td>" + r.estadoPago + "</td>";
        html += "<td>" + r.estado + "</td>";
        html += "<td>";
        if (r.estado != "cancelada") {
          html += "<button class='btn-eliminar' onclick='cancelarReserva(" + i + ")'>Cancelar</button>";
        }
        html += "</td>";
        html += "</tr>";
      }
      tbody.innerHTML = html;
    }

    function cancelarReserva(indice) {
      var confirmar = confirm("¿Cancelar esta reserva?");
      if (!confirmar) return;
      var reservas = JSON.parse(localStorage.getItem("reservas")) || [];
      reservas[indice].estado = "cancelada";
      localStorage.setItem("reservas", JSON.stringify(reservas));
      mostrarReservas();
    }

    function formatearFecha(fecha) {
      if (!fecha) return "—";
      var partes = fecha.split("-");
      return partes[2] + "/" + partes[1] + "/" + partes[0];
    }

    calcularPrecio();
    cargarClientes();
    mostrarReservas();

  </script>

</body>
</html>
