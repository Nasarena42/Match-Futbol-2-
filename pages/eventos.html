<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Clientes - Match Futbol</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⚽</span>
      <div>
        <div class="logo-title">MATCH</div>
        <div class="logo-sub">FÚTBOL</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"
        ><i class="fa-solid fa-house"></i><span><br />Inicio</span></a
      >
      <a href="clientes.html" class="nav-item"
        ><i class="fa-solid fa-users"></i><span><br />Clientes</span></a
      >
      <a href="reservas.html" class="nav-item active"
        ><i class="fa-solid fa-calendar-days"></i><span><br />Reservas</span></a
      >
      <a href="pagos.html" class="nav-item"
        ><i class="fa-solid fa-money-bill"></i><span><br />Pagos</span></a
      >
      <a href="eventos.html" class="nav-item"
        ><i class="fa-solid fa-star"></i><span><br />Eventos</span></a
      >
    </nav>
    <div class="sidebar-footer">Instituto Cervantes</div>
  </aside>
  <main class="main-content">
    <header
      class="top-bar"
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      "
    >
      <h1 class="page-title">Eventos / Quincho</h1>
      <div
        class="top-date"
        id="topDate"
        style="color: var(--texto-suave); font-weight: 500"
      ></div>
    </header>
    <div class="grid-container">
      <section class="section-box">
        <h2
          style="
            font-family: var(--font-titulo);
            font-size: 1.4rem;
            margin-bottom: 16px;
            color: var(--oscuro);
            letter-spacing: 0.5px;
          "
        >
          NUEVO EVENTO
        </h2>
        <div id="errorBanner" class="alert-banner"></div>
        <form id="formEvento">
          <div class="form-group">
            <label for="clienteSelect">Cliente *</label>
            <select id="clienteSelect" required>
              <option value="">-- Seleccioná un cliente --</option>
            </select>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
            <div class="form-group">
              <label for="tipoEvento">Tipo de Evento</label>
              <select id="tipoEvento" class="form-control">
                <option value="Cumpleaños">Cumpleaños</option>
                <option value="Tercer Tiempo">Tercer Tiempo</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label for="invitados">Cantidad de Invitados</label>
              <input
                type="number"
                id="invitados"
                class="form-control"
                min="1"
                placeholder="Ej. 30"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label for="fecha">Fecha del Evento</label>
            <input type="date" id="fecha" class="form-control" required />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
            <div class="form-group">
              <label for="horaInicio">Hora Inicio</label>
              <input type="time" id="horaInicio" class="form-control" required />
            </div>
            <div class="form-group">
              <label for="horaFin">Hora Fin</label>
              <input type="time" id="horaFin" class="form-control" required />
            </div>
          </div>
          <button
            type="submit"
            class="btn-submit"
            style="
              font-family: var(--font-titulo);
              font-size: 1.1rem;
              letter-spacing: 1px;
            "
          >
            CONFIRMAR RESERVA
          </button>
        </form>
      </section>
      <section class="section-box">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
          "
        >
          <h2
            style="
              font-family: var(--font-titulo);
              font-size: 1.4rem;
              color: var(--oscuro);
              margin: 0;
              letter-spacing: 0.5px;
            "
          >
            REPORTE DE OCUPACIÓN
          </h2>
          <div style="display: flex; gap: 8px">
            <button
              type="button"
              class="tab-btn active"
              id="btnDia"
              onclick="filtrarReporte('dia')"
            >
              Hoy
            </button>
            <button
              type="button"
              class="tab-btn"
              id="btnSemana"
              onclick="filtrarReporte('semana')"
            >
              Esta Semana
            </button>
            <button
              type="button"
              class="tab-btn"
              id="btnTodos"
              onclick="filtrarReporte('todos')"
            >
              Ver Todos
            </button>
          </div>
        </div>
        <button id="btnBorrarReservas" style="margin-top: 10px;">
          Borrar todas las reservas
        </button>
        <div style="overflow-x: auto">
          <table
            style="
              width: 100%;
              border-collapse: collapse;
              text-align: left;
              font-size: 0.9rem;
            "
          >
            <thead>
              <tr
                style="
                  border-bottom: 2px solid #edf2f7;
                  color: var(--texto-suave);
                  font-weight: 600;
                "
              >
                <th style="padding: 12px 8px">Cliente</th>
                <th style="padding: 12px 8px">Fecha</th>
                <th style="padding: 12px 8px">Horario</th>
                <th style="padding: 12px 8px">Evento</th>
                <th style="padding: 12px 8px; text-align: center">Invitados</th>
                <th style="padding: 12px 8px">Estado</th>
              </tr>
            </thead>
            <tbody id="tablaEventosBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
  <!-- JavaScript -->
  <script>
    let reservas = JSON.parse(localStorage.getItem("reservas_quincho")) || [
      
    ];
    let filtroActual = "todos";
    // Fecha en la barra superior
    const fechaActual = new Date().toLocaleDateString("es-ES", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric",
    });
    document.getElementById("topDate").textContent =
      fechaActual.charAt(0).toUpperCase() + fechaActual.slice(1);
    // Enviar formulario
    document
      .getElementById("formEvento")
      .addEventListener("submit", function (e) {
        e.preventDefault();
        const errorBanner = document.getElementById("errorBanner");
        errorBanner.style.display = "none";
        const cliente = document.getElementById("clienteSelect").value.trim();
        const tipo = document.getElementById("tipoEvento").value;
        const invitados = parseInt(document.getElementById("invitados").value);
        const fecha = document.getElementById("fecha").value;
        const horaInicio = document.getElementById("horaInicio").value;
        const horaFin = document.getElementById("horaFin").value;
        if (
          !cliente ||
          !fecha ||
          !horaInicio ||
          !horaFin ||
          isNaN(invitados) ||
          invitados < 1
        ) {
          mostrarError("Completá todos los campos correctamente.");
          return;
        }
        if (horaInicio >= horaFin) {
          mostrarError("La hora de fin debe ser mayor a la de inicio.");
          return;
        }
        const tieneCruce = reservas.some(
          (reserva) =>
            reserva.fecha === fecha &&
            horaInicio < reserva.horaFin &&
            horaFin > reserva.horaInicio
        );
        if (tieneCruce) {
          mostrarError("Horario ocupado, elegí otro.");
          return;
        }
        reservas.push({ cliente, fecha, horaInicio, horaFin, tipo, invitados });
        localStorage.setItem("reservas_quincho", JSON.stringify(reservas));
        this.reset();
        renderizarTabla();
        alert("✅ Reserva guardada con éxito");
      });
    function mostrarError(mensaje) {
      const banner = document.getElementById("errorBanner");
      banner.textContent = mensaje;
      banner.style.display = "block";
    }
    function filtrarReporte(tipo) {
      filtroActual = tipo;
      document.querySelectorAll(".tab-btn").forEach((btn) =>
        btn.classList.remove("active")
      );
      document
        .getElementById(`btn${tipo.charAt(0).toUpperCase() + tipo.slice(1)}`)
        .classList.add("active");
      renderizarTabla();
    }
    function renderizarTabla() {
      const cuerpo = document.getElementById("tablaEventosBody");
      const hoy = new Date().toISOString().split("T")[0];
      let datos = [...reservas];
      if (filtroActual === "dia") datos = reservas.filter((r) => r.fecha === hoy);
      if (filtroActual === "semana") {
        const limite = new Date();
        limite.setDate(limite.getDate() + 7);
        const limiteStr = limite.toISOString().split("T")[0];
        datos = reservas.filter((r) => r.fecha >= hoy && r.fecha <= limiteStr);
      }
      if (datos.length === 0) {
        cuerpo.innerHTML = `<tr><td colspan="6" style="padding: 16px; text-align: center; color: var(--texto-suave);">No hay reservas</td></tr>`;
        return;
      }
      cuerpo.innerHTML = datos
        .map((r) => {
          const estado =
            r.fecha >= hoy
              ? '<span class="status-badge status-active">Confirmado</span>'
              : '<span class="status-badge" style="background:#f1f1f1; color:#666;">Finalizado</span>';
          return `
            <tr style="border-bottom:1px solid #eee;">
              <td style="padding:12px 8px;">${r.cliente}</td>
              <td style="padding:12px 8px;">${r.fecha.split("-").reverse().join("/")}</td>
              <td style="padding:12px 8px;">${r.horaInicio} - ${r.horaFin}</td>
              <td style="padding:12px 8px;">${r.tipo}</td>
              <td style="padding:12px 8px; text-align:center;">${r.invitados}</td>
              <td style="padding:12px 8px;">${estado}</td>
            </tr>`;
        })
        .join("");
    }
    function borrarTodasLasReservas() {
      if (
        confirm(
          "¿Estás seguro que quieres borrar todas las reservas? Esta acción no se puede deshacer."
        )
      ) {
        reservas = [];
        localStorage.removeItem("reservas_quincho");
        renderizarTabla();
      }
    }
    document.addEventListener("DOMContentLoaded", function () {
      cargarClientesDesdeReservas();
      renderizarTabla();
      document.getElementById("btnBorrarReservas").onclick = borrarTodasLasReservas;
    });
    function cargarClientesDesdeReservas() {
      const reservasLocal = JSON.parse(localStorage.getItem("reservas_quincho")) || [];
      const clientesUnicos = [...new Set(reservasLocal.map((r) => r.cliente))];
      const selectClientes = document.getElementById("clienteSelect");
      selectClientes.innerHTML = "<option value=''>-- Seleccioná un cliente --</option>";
      clientesUnicos.forEach((cliente) => {
        const opcion = document.createElement("option");
        opcion.value = cliente;
        opcion.textContent = cliente;
        selectClientes.appendChild(opcion);
      });
    }
  </script>
</body>
</html>
