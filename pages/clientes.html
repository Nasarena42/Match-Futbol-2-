<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Match Futbol</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>

  <aside class="sidebar">
    
  <div class="sidebar-logo">
    <span class="logo-icon">⚽</span>
      <div><div class="logo-title">MATCH</div><div class="logo-sub">FÚTBOL</div></div>
      </div>

    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Inicio</span></a>
      <a href="clientes.html"  class="nav-item active"><span class="nav-icon">👥</span><span>Clientes</span></a>
      <a href="reservas.html"  class="nav-item"><span class="nav-icon">📅</span><span>Reservas</span></a>
      <a href="pagos.html"     class="nav-item"><span class="nav-icon">💰</span><span>Pagos</span></a>
      <a href="eventos.html"   class="nav-item"><span class="nav-icon">🎉</span><span>Eventos</span></a>
    </nav>

    <div class="sidebar-footer">Instituto Cervantes</div>
  </aside>

  <main class="main-content"> 


    <header class="top-bar">
      <h1 class="page-title">Clientes</h1>
      <div class="top-date" id="topDate"></div>
    </header>

    <!-- Mensaje de confirmacion -->
    <div class="mensaje-ok" id="mensajeOk">✅ Operación realizada con éxito.</div>

    <!-- Formulario para agregar cliente -->
    <h2>AGREGAR CLIENTES</h2> <br>
    <form id="formCliente">

      <label>Nombre completo *</label>
      <input type="text" id="nombre" placeholder="Ej: Juan Pérez">

      <label>Teléfono *</label>
      <input type="text" id="telefono" placeholder="Ej: 351-1234567">

      <label>Mail</label>
      <input type="email" id="mail" placeholder="correo@ejemplo.com">

      <label>Observaciones</label>
      <textarea id="observaciones" rows="3" placeholder="Notas sobre el cliente..."></textarea>

      <button type="button" onclick="guardarCliente()">Guardar cliente</button>

    </form>

    <!-- Buscador -->
    <h2>LISTA DE CLIENTES</h2>
    <div class="buscador">
      <input type="text" id="buscador" placeholder="🔍 Buscar por nombre o teléfono..." oninput="buscarCliente()">
    </div>

    <!-- Tabla de clientes -->
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Mail</th>
          <th>Observaciones</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaClientes">
        <tr><td colspan="6">No hay clientes registrados.</td></tr>
      </tbody>
    </table>


  </main>
  <script>

    // Variable para saber si estamos editando (guarda el indice del cliente)
    var indiceEditando = -1;

    // Cargar tabla al abrir la pagina
    mostrarClientes();

    // Guarda un cliente nuevo o edita uno existente
    function guardarCliente() {
      var nombre        = document.getElementById("nombre").value.trim();
      var telefono      = document.getElementById("telefono").value.trim();
      var mail          = document.getElementById("mail").value.trim();
      var observaciones = document.getElementById("observaciones").value.trim();

      // Validacion basica
      if (nombre == "" || telefono == "") {
        alert("El nombre y el teléfono son obligatorios.");
        return;
      }

      // Traer la lista actual del localStorage
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];

      if (indiceEditando == -1) {
        // Es un cliente nuevo, lo agrego al array
        var clienteNuevo = {
          nombre:        nombre,
          telefono:      telefono,
          mail:          mail,
          observaciones: observaciones
        };
        clientes.push(clienteNuevo);

      } else {
        // Estoy editando, actualizo el cliente existente
        clientes[indiceEditando].nombre        = nombre;
        clientes[indiceEditando].telefono      = telefono;
        clientes[indiceEditando].mail          = mail;
        clientes[indiceEditando].observaciones = observaciones;

        // Resetear el indice de edicion
        indiceEditando = -1;
        document.querySelector("form button").textContent = "Guardar cliente";
      }

      // Guardar en localStorage
      localStorage.setItem("clientes", JSON.stringify(clientes));

      // Limpiar el formulario
      document.getElementById("nombre").value        = "";
      document.getElementById("telefono").value      = "";
      document.getElementById("mail").value          = "";
      document.getElementById("observaciones").value = "";

      // Mostrar mensaje de exito
      var msg = document.getElementById("mensajeOk");
      msg.style.display = "block";
      setTimeout(function() { msg.style.display = "none"; }, 2500);

      // Actualizar tabla
      mostrarClientes();
    }

    // Muestra los clientes en la tabla
    function mostrarClientes() {
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var tbody = document.getElementById("tablaClientes");

      if (clientes.length == 0) {
        tbody.innerHTML = "<tr><td colspan='6'>No hay clientes registrados.</td></tr>";
        return;
      }

      var html = "";
      for (var i = 0; i < clientes.length; i++) {
        var c = clientes[i];
        html += "<tr>";
        html += "<td>" + (i + 1) + "</td>";
        html += "<td>" + c.nombre + "</td>";
        html += "<td>" + c.telefono + "</td>";
        html += "<td>" + (c.mail || "—") + "</td>";
        html += "<td>" + (c.observaciones || "—") + "</td>";
        html += "<td>";
        html += "<button class='btn-editar' onclick='editarCliente(" + i + ")'>Editar</button>";
        html += "<button class='btn-eliminar' onclick='eliminarCliente(" + i + ")'>Eliminar</button>";
        html += "</td>";
        html += "</tr>";
      }

      tbody.innerHTML = html;
    }

    // Carga los datos del cliente en el formulario para editar
    function editarCliente(indice) {
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var c = clientes[indice];

      document.getElementById("nombre").value        = c.nombre;
      document.getElementById("telefono").value      = c.telefono;
      document.getElementById("mail").value          = c.mail || "";
      document.getElementById("observaciones").value = c.observaciones || "";

      // Guardar indice para saber cual editar al hacer click en guardar
      indiceEditando = indice;
      document.querySelector("form button").textContent = "Actualizar cliente";

      // Scroll al formulario
      window.scrollTo(0, 0);
    }

    // Elimina un cliente por su indice
    function eliminarCliente(indice) {
      var confirmar = confirm("¿Estás seguro de que querés eliminar este cliente?");
      if (!confirmar) return;

      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      clientes.splice(indice, 1);
      localStorage.setItem("clientes", JSON.stringify(clientes));

      mostrarClientes();
    }

    // Filtrar clientes por nombre o telefono
    function buscarCliente() {
      var texto   = document.getElementById("buscador").value.toLowerCase();
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var tbody   = document.getElementById("tablaClientes");

      var resultado = [];
      for (var i = 0; i < clientes.length; i++) {
        var c = clientes[i];
        if (c.nombre.toLowerCase().indexOf(texto) != -1 || c.telefono.indexOf(texto) != -1) {
          resultado.push({ cliente: c, indiceReal: i });
        }
      }

      if (resultado.length == 0) {
        tbody.innerHTML = "<tr><td colspan='6'>No se encontraron clientes.</td></tr>";
        return;
      }

      var html = "";
      for (var j = 0; j < resultado.length; j++) {
        var c = resultado[j].cliente;
        var idx = resultado[j].indiceReal;
        html += "<tr>";
        html += "<td>" + (idx + 1) + "</td>";
        html += "<td>" + c.nombre + "</td>";
        html += "<td>" + c.telefono + "</td>";
        html += "<td>" + (c.mail || "—") + "</td>";
        html += "<td>" + (c.observaciones || "—") + "</td>";
        html += "<td>";
        html += "<button class='btn-editar' onclick='editarCliente(" + idx + ")'>Editar</button>";
        html += "<button class='btn-eliminar' onclick='eliminarCliente(" + idx + ")'>Eliminar</button>";
        html += "</td>";
        html += "</tr>";
      }
      tbody.innerHTML = html;
    }

  </script>

</body>
</html>
