<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Match Futbol</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    
  <div class="sidebar-logo">
    <span class="logo-icon">⚽</span>
      <div><div class="logo-title">MATCH</div><div class="logo-sub">FÚTBOL</div></div>
      </div>

       <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item">
        <i class="fa-solid fa-house"></i><span><br>Inicio</span>
      </a>
      <a href="clientes.html" class="nav-item active">
        <i class="fa-solid fa-users"></i><span><br>Clientes</span>
      </a>
      <a href="reservas.html" class="nav-item">
        <i class="fa-solid fa-calendar-days"></i><span><br>Reservas</span>
      </a>
      <a href="pagos.html" class="nav-item">
        <i class="fa-solid fa-money-bill"></i><span><br>Pagos</span>
      </a>
      <a href="eventos.html" class="nav-item">
        <i class="fa-solid fa-star"></i><span><br>Eventos</span>
      </a>
  </nav>

    <div class="sidebar-footer">Instituto Cervantes</div>
  </aside>

  <main class="main-content"> 


    <header class="top-bar">
      <h1 class="page-title">Clientes</h1>
      <div class="top-date" id="topDate"></div>
    </header>

    <!-- Mensaje de confirmacion -->
    <div class="mensaje-ok" id="mensajeOk">Operación realizada con éxito.</div>

    <!-- Formulario para agregar cliente -->
    <h2>AGREGAR CLIENTES</h2> <br>
    <form id="formCliente">
      
      <label>DNI *</label>
      <input type="text" id="dni" placeholder="Ej: 42XXXXXX">

      <label>Apellido y Nombre*</label>
      <input type="text" id="nombre" placeholder="Ej: Pérez">

      <label>Teléfono</label>
      <input type="text" id="telefono" placeholder="351-XXXXXXX">

      <label>Observaciones</label>
      <textarea id="observaciones" rows="3" placeholder="Notas sobre el cliente..."></textarea>

      <button type="button" onclick="guardarCliente()">Guardar cliente</button>

    </form>

    <!-- Buscador -->
    <h2>LISTA DE CLIENTES</h2>
    <div class="buscador">
      <input type="text" id="buscador" placeholder="Buscar por nombre o tléfono..." oninput="buscarCliente()">
    </div>

    <!-- Tabla de clientes -->
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Teléfono</th>
          <th>Observaciones</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaClientes">
        <tr><td colspan="6">No hay clientes registrados.</td></tr>
      </tbody>
    </table>


  </main>
  <script>

    var fecha = new Date();
    var opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById("topDate").textContent = fecha.toLocaleDateString('es-AR', opciones);

    var indiceEditando = -1;

    mostrarClientes();

    function guardarCliente() {
      var nombre        = document.getElementById("nombre").value.trim();
      var dni           = document.getElementById("dni").value.trim();
      var telefono      = document.getElementById("telefono").value.trim();
      var observaciones = document.getElementById("observaciones").value.trim();

      if (nombre == "" || telefono == "") {
        alert("El nombre y el teléfono son obligatorios.");
        return;
      }

      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];

      if (indiceEditando == -1) {
        var clienteNuevo = {
          nombre:        nombre,
          dni:           dni,
          telefono:      telefono,
          observaciones: observaciones
        };
        clientes.push(clienteNuevo);
      } else {
        clientes[indiceEditando].nombre        = nombre;
        clientes[indiceEditando].dni           = dni;
        clientes[indiceEditando].telefono      = telefono;
        clientes[indiceEditando].observaciones = observaciones;

        indiceEditando = -1;
        document.querySelector("form button").textContent = "Guardar cliente";
      }

      localStorage.setItem("clientes", JSON.stringify(clientes));

      document.getElementById("nombre").value        = "";
      document.getElementById("dni").value           = "";
      document.getElementById("telefono").value      = "";
      document.getElementById("observaciones").value = "";

      var msg = document.getElementById("mensajeOk");
      msg.style.display = "block";
      setTimeout(function() { msg.style.display = "none"; }, 2500);

      mostrarClientes();
    }

    function mostrarClientes() {
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var tbody = document.getElementById("tablaClientes");

      if (clientes.length == 0) {
        tbody.innerHTML = "<tr><td colspan='6'>No hay clientes registrados.</td></tr>";
        return;
      }

      var html = "";
      for (var i = 0; i < clientes.length; i++) {
        var c = clientes[i];
        html += "<tr>";
        html += "<td>" + (i + 1) + "</td>";
        html += "<td>" + c.nombre + "</td>";
        html += "<td>" + c.dni + "</td>";
        html += "<td>" + c.telefono + "</td>";
        html += "<td>" + (c.observaciones || "—") + "</td>";
        html += "<td>";
        html += "<button class='btn-editar' onclick='editarCliente(" + i + ")'>Editar</button>";
        html += "<button class='btn-eliminar' onclick='eliminarCliente(" + i + ")'>Eliminar</button>";
        html += "</td>";
        html += "</tr>";
      }

      tbody.innerHTML = html;
    }

    function editarCliente(indice) {
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var c = clientes[indice];

      document.getElementById("nombre").value        = c.nombre;
      document.getElementById("dni").value           = c.dni;
      document.getElementById("telefono").value      = c.telefono  || "";
      document.getElementById("observaciones").value = c.observaciones || "";

      indiceEditando = indice;
      document.querySelector("form button").textContent = "Actualizar cliente";

      window.scrollTo(0, 0);
    }

    function eliminarCliente(indice) {
      var confirmar = confirm("¿Estás seguro de que querés eliminar este cliente?");
      if (!confirmar) return;

      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      clientes.splice(indice, 1);
      localStorage.setItem("clientes", JSON.stringify(clientes));

      mostrarClientes();
    }

    function buscarCliente() {
      var texto    = document.getElementById("buscador").value.toLowerCase();
      var clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      var tbody    = document.getElementById("tablaClientes");

      var resultado = [];
      for (var i = 0; i < clientes.length; i++) {
        var c = clientes[i];
        if (c.nombre.toLowerCase().indexOf(texto) != -1 || c.telefono.indexOf(texto) != -1) {
          resultado.push({ cliente: c, indiceReal: i });
        }
      }

      if (resultado.length == 0) {
        tbody.innerHTML = "<tr><td colspan='6'>No se encontraron clientes.</td></tr>";
        return;
      }

      var html = "";
      for (var j = 0; j < resultado.length; j++) {
        var c   = resultado[j].cliente;
        var idx = resultado[j].indiceReal;
        html += "<tr>";
        html += "<td>" + (idx + 1) + "</td>";
        html += "<td>" + c.nombre + "</td>";
        html += "<td>" + c.dni + "</td>";
        html += "<td>" + c.telefono + "</td>";
        html += "<td>" + (c.observaciones || "—") + "</td>";
        html += "<td>";
        html += "<button class='btn-editar' onclick='editarCliente(" + idx + ")'>Editar</button>";
        html += "<button class='btn-eliminar' onclick='eliminarCliente(" + idx + ")'>Eliminar</button>";
        html += "</td>";
        html += "</tr>";
      }
      tbody.innerHTML = html;
    }

  </script>

</body>
</html>
